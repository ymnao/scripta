# pnpm 11 設定の正準ロケーション（pnpm 11 で `package.json:pnpm` からの移行が推奨）。
# 単一パッケージリポジトリだが、settings の集約先として本ファイルを使う。
# 各 setting の意味は https://pnpm.io/settings 参照。

# 単一パッケージでも `packages` に root を含めておくことで、pnpm が本ファイルを
# workspace manifest として解釈した際に「対象パッケージなし」扱いにならないようにする。
packages:
  - "."

# pnpm 11 既定値の明示宣言。デフォルトが変わっても本リポジトリのポスチャを固定する。
#
# 注意: `minimumReleaseAge` を **明示設定すると** `minimumReleaseAgeStrict` が自動で true
# になり、組み込み既定 (`false`) より厳しい挙動になる（24h 未満のバージョンしか range 内に
# 存在しない場合は fallback せずに resolution 失敗）。本リポジトリの依存はほぼ stable lib
# で 24h 未満リリースが唯一解になるケースは稀なため、fail-loud な strict 挙動を選んでいる。
# pnpm 11 の built-in default 相当に戻したい場合は `minimumReleaseAgeStrict: false` を追記する。
minimumReleaseAge: 1440
blockExoticSubdeps: true
strictDepBuilds: true

# strictDepBuilds=true 下で build script の実行を許可する依存。
#
# pnpm 11 の判定は registry メタデータ / lockfile resolution に基づくため、`package.json`
# の `scripts` フィールドをローカルで grep しても網羅できない（biome / electron は
# scripts=null だが pnpm はブロックする）。ここのリストは `pnpm install --frozen-lockfile`
# で `[ERR_PNPM_IGNORED_BUILDS]` に出てきた package を都度足して維持する。
allowBuilds:
  "@biomejs/biome": true
  esbuild: true
  electron: true
  electron-winstaller: true

# `$@codemirror/...` は「direct dep の version を全 transitive にも強制」の self-ref 記法。
# CodeMirror package は module-level singleton (StateField / Facet / NodeProp) を含むため、
# 同一 package の複数バージョンが lockfile に共存すると copy 間で field identity が一致せず
# runtime で破綻する。state / view は複数共存で TypeScript の private property declaration
# 衝突 (例: `EditorView.dispatchTransactions`) によりビルドも壊れる。
# language / commands は PR #274 の bump で dual copy (6.12.3+6.12.4 / 6.10.3+6.10.4) が発生し、
# lang-markdown 側 copy の `Language.state` field をアプリ側 copy の `syntaxTree()` が引けず
# 空 tree になって live-preview 系 224 assertion + electron-e2e (image / mermaid widget) が
# 全滅した。以後 root direct dep の @codemirror 全 package を self-ref で単一化する。
#
# `brace-expansion` は GHSA-jxxr-4gwj-5jf2（DoS、>=5.0.0 <5.0.6）対応。transitive dep として
# minimatch 等から間接的に入るため、direct でない pin を override で強制する。selector を
# `brace-expansion@^5.0.0` に絞り、advisory 対象外の v1/v2 など旧 major が将来 transitive と
# して入る余地を残す（semver 互換性を破壊しない）。
overrides:
  "@codemirror/autocomplete": $@codemirror/autocomplete
  "@codemirror/commands": $@codemirror/commands
  "@codemirror/lang-markdown": $@codemirror/lang-markdown
  "@codemirror/language": $@codemirror/language
  "@codemirror/language-data": $@codemirror/language-data
  "@codemirror/search": $@codemirror/search
  "@codemirror/state": $@codemirror/state
  "@codemirror/view": $@codemirror/view
  "@lezer/common": ^1.5.2
  "brace-expansion@^5.0.0": ^5.0.6
  "tmp@<0.2.6": ">=0.2.6"          # GHSA: Path Traversal (Dep #7)。tmp-promise → tmp@0.2.5 を修正版へ強制
  # security advisory 対応の override は global ではなく `parent>child` syntax で
  # alert 入口に絞る。将来別 transitive が同名 package の旧 version を要求した
  # 場合に意図せず major/minor をまたいで強制されるのを防ぐ。
  # 各 GHSA の実害評価は本リポ用途で「いずれも実害なし」、alert closed 化が目的。
  "electron-vite>esbuild": ^0.28.1        # GHSA-gv7w-rqvm-qjhr (high, Dep #8)。electron-vite@5.0.0 の `^0.25.11` 固定を patched 版へ。脆弱性は Deno module 限定、本リポ Node path は binaryIntegrityCheck() 保護下。上流が ^0.28 許容したら削除可。
  "electron-vite>@babel/core": ^7.29.6    # GHSA-4x5r-pxfx-6jf8 (low)。electron-vite 経由の 7.29.0 を source map disclosure patched 版へ。self-contained build なので攻撃前提を満たさず。
  "electron-publish>form-data": ^4.0.6    # GHSA-hmw2-7cc7-3qxx (high)。electron-publish 経由の 4.0.5 を CRLF injection patched 版へ。build-time 自前入力のみで attacker-controlled な append() 引数は無し。
  "app-builder-lib>tar": ^7.5.16          # GHSA-vmf3-w455-68vh (moderate)。app-builder-lib 経由の node-tar 7.5.13 を PAX header desync patched 版へ。自前 build 成果物 archive のみで攻撃者作成 tar の parse は無し。
  "node-gyp>tar": ^7.5.16                 # 同 GHSA-vmf3-w455-68vh。node-gyp も独立して node-tar 7.5.13 を direct dep として持つため別行で対応。
  "mermaid>dompurify": ^3.4.9             # GHSA-vxr8-fq34-vvx9 (low)。mermaid@11.15.0 が direct dep として持つ 3.4.8 を Trusted Types reset patched 版へ。direct dep の ^3.4.10 と同 minor なので mermaid 描画互換性は CI e2e で担保。
  "@electron/get>undici": ^7.28.0         # GHSA-pr7r-676h-xcf6 (medium, #10), GHSA-vmh5-mc38-953g (high, #11), GHSA-35p6-xmwp-9g52 (low, #13), GHSA-hm92-r4w5-c3mj (high, #14), GHSA-p88m-4jfj-68fv (medium, #18), GHSA-g8m3-5g58-fq7m (low, #20)。@electron/get@5.0.0 の optionalDependencies 7.25.0 を patched 版へ。SOCKS5/TLS bypass・Set-Cookie injection 等を含むが、本リポは electron バイナリ取得目的での透過利用のみで攻撃前提なし。
  "jsdom>undici": ^7.28.0                 # 同 7.x 系 6 件 (#10/#11/#13/#14/#18/#20)。jsdom@29.1.1 の 7.25.0 を patched 版へ。jsdom は Vitest の DOM 環境用 (devDep only) なので runtime 影響なし。
  "node-gyp>undici": ^6.27.0              # GHSA-35p6-xmwp-9g52 (low, #12), GHSA-p88m-4jfj-68fv (medium, #17), GHSA-g8m3-5g58-fq7m (low, #19)。node-gyp@12.3.0 (@electron/rebuild → electron-builder 経由) の 6.25.0 を patched 版へ。build time の native module rebuild のみで attacker-controlled HTTP fetch なし。

# 意図的に override しない transitive duplicates の記録（dedupe 不可だが許容）:
#
# - **`katex`** (dual-resolution allow): 本リポは direct で `^0.17.0` を pin するが、
#   `mermaid@11.x` が dependencies として `katex@^0.16.25` を持つため（peerDependency
#   ではなく direct dep）、`pnpm dedupe` で `0.17.0` には合流不可。`katex` を `^0.17.0`
#   で override 強制すると mermaid 内部の math 描画 (mermaid graph の数式ラベル) が
#   breaks する可能性があり、mermaid 上流が `katex@^0.17` をサポートする
#   (mermaid 12.x 目処 / 2026-05 時点で上流 issue 未起票) まで dual-resolution を許容する。
#   実害評価: 本体 TeX 描画 (Live Preview / PDF export) は 0.17.0 のみ呼ばれ、mermaid
#   経由の 0.16.x は mermaid graph 内の数式ラベル描画にのみ使用される。bundle 増は
#   ~280KB (gzip 後 ~80KB) 程度、Phase 6 packaged build スモークで実機確認。
#   解消条件: mermaid が `katex@^0.17` 以上を peer/dep として宣言した時点でこの
#   コメントごと削除し、`pnpm dedupe` で 0.17.0 へ統合する。

patchedDependencies:
  style-mod@4.1.3: patches/style-mod@4.1.3.patch
