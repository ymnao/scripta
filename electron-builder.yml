# bundle ID (com.scripta.app: macOS bundle ID / Windows
# レジストリ / Windows AUMID 用)。userData ディレクトリ名 (= app.getName) の
# 継続は別途 electron/main/index.ts の app.setName("scripta") で行う。
appId: com.scripta.app
productName: scripta
copyright: Copyright © 2026 ymnao

directories:
  output: release

files:
  - out/**/*
  - package.json

# dmg 命名は electron-builder 26.x の default artifactName pattern に依存する。
# `mac.artifactName` を明示すると isUserForced=true で skipDefaultArch が
# 無効化され x64 にも `-x64` suffix が付いて Cask URL 契約 (issue #282) が
# 壊れるため、明示 pin ではなく drift-lock で守る (docs/parity-checklist.md §11)。
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - x64
        - arm64

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - AppImage
    - deb
  category: Office
  maintainer: ymnao

# owner/repo は git remote から自動推定（リリース切り替え後の修正を不要にする）。
# draft で停止し、本文を整えて手動 publish するまで自動アップデートチャンネルに載らない。
publish:
  provider: github
  releaseType: draft
