# 旧 Tauri 版 (com.scripta.app) と bundleId を揃え、macOS Application Support /
# Windows レジストリ等の保存先を継続させる（旧版設定の手動移行を不要にする）。
appId: com.scripta.app
productName: scripta
copyright: Copyright © 2025 ymnao

directories:
  output: release

files:
  - out/**/*
  - package.json

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - x64
        - arm64

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - AppImage
    - deb
  category: Office
  maintainer: ymnao

# owner/repo は git remote から自動推定（リリース切り替え後の修正を不要にする）。
# draft で停止し、本文を整えて手動 publish するまで自動アップデートチャンネルに載らない。
publish:
  provider: github
  releaseType: draft
