name: Security Audit

# pnpm audit の定期実行 (#205)。Dependabot より高頻度・open-pull-requests-limit (10) に
# 縛られず、検出時のみ issue を自動作成する。Dependabot の自動 PR とは棲み分け
# (Dependabot=patch 提案、こちら=advisory 通知のみ)。
#
# Schedule cron は毎週月曜 06:30 UTC (CodeQL の日曜 05:30 とは別曜日で分散)。
# GitHub の cron は ±15min ジッタがあるので :30 を選んでキュー衝突を回避。

on:
  schedule:
    - cron: "30 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # issue 作成 / 既存 issue へのコメント追加で必要。
      issues: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-node-pnpm

      # pnpm audit は high 以上の advisory がある場合に exit 1。
      # JSON 出力を後段の report に使うため continue-on-error で次 step に進める。
      - name: Run pnpm audit
        id: audit
        continue-on-error: true
        run: |
          set +e
          pnpm audit --audit-level=high --json > audit-report.json
          code=$?
          if [ "$code" -eq 0 ]; then
            echo "has_advisories=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_advisories=true" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Generate report markdown
        if: steps.audit.outputs.has_advisories == 'true'
        # Unquoted heredoc で GHA テンプレ (${{ ... }}) と shell expansion (`$(...)`) を
        # 両方展開する。markdown 内の backtick は heredoc 内では escape (\`) が必要。
        run: |
          cat > audit-issue-body.md <<MD
          # pnpm audit advisory 検出

          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Triggered: ${{ github.event_name }}
          Generated at: $(date -u +%Y-%m-%dT%H:%M:%SZ)

          ## pnpm audit --audit-level=high --json

          \`\`\`json
          $(cat audit-report.json)
          \`\`\`

          ## 対応

          - \`pnpm-workspace.yaml\` の \`overrides\` で \`parent>child\` 形式の pin
          - GHSA 番号と実害評価をコメントに残す (v0.4.0 / v0.5.0 で確立した parent>child override 規約)
          MD

      # 重複 issue を避けるため、同 label の open issue があればコメント追加 (issue-number
      # を渡す)。無ければ新規作成。peter-evans/create-issue-from-file は issue-number が
      # 空文字なら新規作成として扱う。
      - name: Find existing open audit issue
        if: steps.audit.outputs.has_advisories == 'true'
        id: find_issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing=$(gh issue list --label security-audit --state open --json number --jq '.[0].number // ""')
          echo "issue_number=${existing}" >> "$GITHUB_OUTPUT"

      - name: Create or update audit issue
        if: steps.audit.outputs.has_advisories == 'true'
        uses: peter-evans/create-issue-from-file@fca9117c27cdc29c6c4db3b86c48e4115a786710 # v6.0.0
        with:
          title: "Security: pnpm audit advisory 検出"
          content-filepath: audit-issue-body.md
          issue-number: ${{ steps.find_issue.outputs.issue_number }}
          labels: security-audit
