name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  create-release:
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify tag matches app version
        run: |
          TAG="${{ github.ref_name }}"
          V_TAURI="v$(jq -r '.version' src-tauri/tauri.conf.json)"
          V_PKG="v$(jq -r '.version' package.json)"
          V_CARGO="v$(sed -n 's/^version = "\(.*\)"/\1/p' src-tauri/Cargo.toml | head -1)"
          MISMATCH=""
          [ "$TAG" != "$V_TAURI" ] && MISMATCH="$MISMATCH tauri.conf.json=$V_TAURI"
          [ "$TAG" != "$V_PKG" ]   && MISMATCH="$MISMATCH package.json=$V_PKG"
          [ "$TAG" != "$V_CARGO" ] && MISMATCH="$MISMATCH Cargo.toml=$V_CARGO"
          if [ -n "$MISMATCH" ]; then
            echo "::error::Tag $TAG does not match:$MISMATCH"
            exit 1
          fi

      - name: Create draft release (idempotent)
        run: gh release view "${{ github.ref_name }}" &>/dev/null || gh release create "${{ github.ref_name }}" --draft --generate-notes --title "${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: create-release
    timeout-minutes: 60
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15
            args: --target universal-apple-darwin
            rust_target: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-2025
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      - name: Build and upload
        id: tauri
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseDraft: true
          args: ${{ matrix.args }}

      - name: Generate checksums
        shell: bash
        run: |
          hash_cmd="sha256sum"
          if ! command -v sha256sum &>/dev/null; then
            hash_cmd="shasum -a 256"
          fi
          for file in $(echo '${{ steps.tauri.outputs.artifactPaths }}' | jq -r '.[]'); do
            (cd "$(dirname "$file")" && $hash_cmd "$(basename "$file")") >> "$RUNNER_TEMP/checksums-${{ matrix.platform }}.txt"
          done

      - name: Upload checksum artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: checksums-${{ matrix.platform }}
          path: ${{ runner.temp }}/checksums-${{ matrix.platform }}.txt

      - name: Prepare artifact paths for attestation
        id: artifact-paths
        shell: bash
        run: |
          {
            echo 'paths<<EOF'
            echo '${{ steps.tauri.outputs.artifactPaths }}' | jq -r '.[]'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ steps.artifact-paths.outputs.paths }}

  upload-checksums:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: checksums-*
          merge-multiple: true

      - name: Upload checksums to release
        run: |
          cat checksums-*.txt | sort > SHA256SUMS.txt
          gh release upload "${{ github.ref_name }}" SHA256SUMS.txt --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
