name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # tag を打つ前に package.json の version を bump し忘れていると、配布物に
      # 0.0.0 が焼き込まれてアプリ内のアップデート判定 (electron/main/ipc/update.ts)
      # が初回リリース以降ずっと誤検知し続ける。pre-flight で食い違いを検出する。
      - name: Verify package.json version matches tag
        shell: bash
        run: |
          pkg_version=$(jq -r .version package.json)
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$pkg_version" != "$tag_version" ]; then
            echo "::error::package.json version ($pkg_version) does not match tag ($tag_version). Bump package.json before tagging."
            exit 1
          fi

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" \
              --draft \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi

  dist:
    needs: [create-release]
    # workflow_dispatch では create-release が skipped、tag push 時は success を待つ。
    if: |
      always() && !cancelled() &&
      (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-node-pnpm

      # 本番証明書未配線。ローカル開発者証明書を誤って拾わないよう自動署名探索を切る。
      - name: Build distributables
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: pnpm dist

      # electron-updater 配線時には differential update 用の `*.zip` / `*.blockmap` /
      # `latest*.yml` (mac は `latest-mac.yml`) を以下 glob と Attach step の glob に
      # 追加し、electron-builder.yml の `mac.target: zip` も復活させる必要がある。
      - name: Upload CI artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scripta-${{ matrix.os }}
          # keep in sync with dist.steps[Attach to GitHub Release].files
          path: |
            release/*.dmg
            release/*.AppImage
            release/*.deb
            release/*.exe
          if-no-files-found: ignore
          retention-days: 14

      # `--clobber` で matrix rerun 時の同名アセット衝突を回避。
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          shopt -s nullglob
          # keep in sync with dist.steps[Upload CI artifact].path
          files=(
            release/*.dmg
            release/*.AppImage
            release/*.deb
            release/*.exe
          )
          if [ ${#files[@]} -gt 0 ]; then
            gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber
          fi
