version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      tauri-plugins:
        patterns:
          - "@tauri-apps/plugin-*"

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
    groups:
      tauri-plugins:
        patterns:
          - "tauri-plugin-*"
